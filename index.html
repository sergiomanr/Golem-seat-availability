<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golem Cínes - Cartelera</title>
    <style>
        :root {
            --bg-color: #000000;
            --floor-color: #585555;
            --seat-available: #9dfb6b;
            --seat-occupied: #979797;
            --seat-hover: #fab005;
            --text-light: #f8f9fa;
            --accent: #e9ecef;
        }

        @font-face {
            font-family: 'Suisse';
            src: local('Suisse'), local('Suisse Int\'l'), local('Suisse Intl');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'Suisse', 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            display: flex;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Sidebar Styling */
        #sidebar {
            width: 350px;
            background-color: var(--sidebar-bg);
            border-right: 1px;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid var(--floor-color);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .date-group {
            margin-bottom: 20px;
        }

        .date-header {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .movie-btn {
            background: none;
            border: 1px;
            color: var(--text-light);
            padding: 12px;
            width: 100%;
            text-align: left;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
            margin-bottom: 8px;
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .movie-btn:hover {
            background-color: #333;
        }

        .movie-btn.active {
            border-color: var(--seat-available);
            background-color: rgba(157, 251, 107, 0.1);
        }

        .movie-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .availability-badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            background: rgba(157, 251, 107, 0.2);
            color: var(--seat-available);
        }

        /* Main Area Styling */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; 
            padding: 60px 40px; 
            position: relative;
            overflow-y: auto;
        }

        #room-title {
            font-size: 2.2rem;
            letter-spacing: 5px;
            font-weight: 700;
            margin: 0;
        }

        #selected-movie {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 30px;
            text-align: center;
        }

        .theater-container {
            background-color: var(--floor-color);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 450px;
            margin-bottom: 20px;
            align-items: center; /* Center the rows block */
        }

        .theater-row {
            display: grid;
            gap: 6px;
            /* We will dynamically set grid-template-columns via JS */
            align-items: center;
        }

        .seat {
            width: 22px; 
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            transition: transform 0.1s;
        }

        .seat:hover {
            z-index: 100;
        }

        .seat.available {
            background-color: var(--seat-available);
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2);
        }

        .seat.available:hover {
            transform: scale(1.2);
            background-color: var(--seat-hover);
        }

        .seat.occupied {
            background-color: var(--seat-occupied);
            cursor: default;
            opacity: 0.8;
        }

        .seat.accessible::after {
            content: "♿";
            font-size: 12px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .section-label {
            width: 100%;
            text-align: center;
            font-size: 0.6rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0; /* Remove margin to not break grid */
            pointer-events: none;
        }

        .stage {
            background: linear-gradient(to bottom, #e9ecef, #adb5bd);
            color: #212529;
            text-align: center;
            padding: 8px;
            margin-top: 20px;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 4px;
            letter-spacing: 12px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.2);
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            margin-bottom: 40px; 
            background: rgba(0,0,0,0.2);
            padding: 10px 25px;
            border-radius: 30px;
        }
        .seat:hover .tooltip {
            opacity: 1;
        }
        .tooltip {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            background: #212529;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 200;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
        }

        .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Filmoteca</h2>
        <h3 id="occupancy-info"> Aproximadamente el --% de las butacas estan ocupadas</h3>
        <div id="movie-list">
            <!-- Populated by JS -->
        </div>
    </div>

    <div id="main-content">
        <h1 id="room-title">SELECCIONA UNA SESIÓN</h1>
        <p id="selected-movie">Toca una película en la columna de la izquierda</p>

        <div class="theater-container" id="theater-map" style="display:none;">
            <!-- Seats will be injected here -->
        </div>

        <div class="stage" id="stage" style="display:none;">ESCENARIO</div>

        <div class="legend" id="legend" style="display:none;">
            <div class="legend-item">
                <div class="legend-dot" style="background: var(--seat-available);"></div>
                Libre
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: var(--seat-occupied);"></div>
                Ocupado
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: var(--seat-available); display:flex; align-items:center; justify-content:center; color:white; font-size:10px;">♿</div>
                Movilidad Reducida
            </div>
        </div>
    </div>

    <script>
        const ROOM_LAYOUTS = {
            "Sala 1": {
                direction: "tlr",
                rows: [
                    { row: 7, seats: 11 },
                    { row: 6, seats: 10, offset: 1 },
                    { row: 5, seats: 10, offset: 1 },
                    { row: 4, seats: 11 },
                    { row: 3, seats: 11 },
                    { row: 2, seats: 11 },
                    { row: 1, seats: 10 }
                ]
            },
            "Sala 2": {
                direction: "ltr",
                rows: [
                    { row: 13, seats: 13, offset: 2 },
                    { row: 12, seats: 14, offset: 2 },
                    { row: 11, seats: 15, offset: 1 },
                    { row: 10, seats: 16, offset: 1 }, 
                    { row: 9,  seats: 16, offset: 1 },
                    { row: 8,  seats: 16, offset: 1 },
                    { row: 7,  seats: 16, offset: 1 },
                    { row: 6,  seats: 15, offset: 1 },
                    { row: 5,  seats: 15, offset: 1 },
                    { row: 4,  seats: 13, offset: 2 },
                    { row: 3,  seats: 16, offset: 1 },
                    { row: 2,  seats: 16, offset: 1 },
                    { row: 1,  seats: 15, offset: 2 }
                ]
            },
            "Sala 3": {
                direction: "rtl",
                rows: [
                    { row: 7, seats: 10, offset: 3 },
                    { row: 6, seats: 8, offset: 4 },
                    { row: 5, seats: 10, gap: { afterSeat: 2, size: 2 } }, 
                    { row: 4, seats: 8, offset: 4 },
                    { row: 3, seats: 8, offset: 4 },
                    { row: 2, seats: 9, offset: 4 },
                    { row: 1, seats: 11, offset: 3 }
                ]
            },
            "Sala 4": {
                direction: "ltr",
                rows: [
                    { row: 11, seats: 11, offset: 3},
                    { row: 10, seats: 12, offset: 2},
                    { row: 9,  seats: 12, offset: 1 },
                    { row: 8,  seats: 12, offset: 1 },
                    { row: 7,  seats: 12, offset: 1 },
                    { row: 6,  seats: 11, offset: 2 },
                    { row: 5,  seats: 11, offset: 2 },
                    { row: 4,  seats: 10, offset: 2 },
                    { row: 3,  seats: 10, offset: 2 },
                    { row: 2,  seats: 9, offset: 3 },
                    { row: 1,  seats: 7, offset: 4 }
                ]
            },
            "Sala 5": {
                direction: "ltr",
                rows: [
                    { row: 13, seats: 13, offset: 1 },
                    { row: 12, seats: 13, offset: 1 },
                    { row: 11, seats: 13, offset: 1 },
                    { row: 10, seats: 13, offset: 1 },
                    { row: 9,  seats: 13, offset: 1 },
                    { row: 8,  seats: 12, offset: 2 },
                    { row: 7,  seats: 11, offset: 2 },
                    { row: 6,  seats: 10, offset: 2 },
                    { row: 5,  seats: 13, offset: 0 },
                    { row: 4,  seats: 13, offset: 0 },
                    { row: 3,  seats: 13, offset: 0 },
                    { row: 2,  seats: 12, offset: 1 },
                    { row: 1,  seats: 10, offset: 2 }
                ]
            }
        };

        let moviesData = {};

        async function init() {
            try {
                const response = await fetch('movies_data.json');
                moviesData = await response.json();
                
                renderSidebar();
            } catch (err) {
                console.error("Error loading data:", err);
            }
        }

        function renderSidebar() {
            const list = document.getElementById('movie-list');
            const sessionsByDate = {};
            
            let totalFree = moviesData.total_free || 0;
            let totalOccupied = moviesData.total_occupied || 0;
            
            const keysExist = ('total_free' in moviesData && 'total_occupied' in moviesData);

            Object.entries(moviesData).forEach(([title, timeSlots]) => {
                if (title === 'total_free' || title === 'total_occupied') return;
                
                Object.entries(timeSlots).forEach(([timeKey, data]) => {
                    const date = data.Date || "Sin fecha";
                    if (!sessionsByDate[date]) sessionsByDate[date] = [];
                    // Inject the exact time key if data.Time is missing
                    sessionsByDate[date].push({ title, timeKey, ...data });
                    
                    if (!keysExist) {
                        totalFree += data.available_seats ? data.available_seats.length : 0;
                        totalOccupied += data.occupied_seats ? data.occupied_seats.length : 0;
                    }
                });
            });

            const totalSeats = totalFree + totalOccupied;
            const percentage = totalSeats > 0 ? Math.round((totalOccupied / totalSeats) * 100) : 0;
            document.getElementById('occupancy-info').textContent = `Aproximadamente el ${percentage}% de las butacas estan ocupadas`;

            // Sort dates
            const sortedDates = Object.keys(sessionsByDate).sort();

            sortedDates.forEach(date => {
                const group = document.createElement('div');
                group.className = 'date-group';
                
                const header = document.createElement('div');
                header.className = 'date-header';
                header.textContent = date;
                group.appendChild(header);

                sessionsByDate[date].forEach(session => {
                    // Calculate availability percentage
                    const availableCount = session.available_seats ? session.available_seats.length : 0;
                    const occupiedCount = session.occupied_seats ? session.occupied_seats.length : 0;
                    const totalSeats = availableCount + occupiedCount;
                    const availabilityPct = totalSeats > 0 ? Math.round((availableCount / totalSeats) * 100) : 0;

                    // Extract time from URL if possible (fallback to Time property)
                    let time = session.timeKey || session.Time || "";
                    if (!time && session.url && session.url[1]) {
                        const parts = session.url[1].split('/');
                        const lastPart = parts[parts.length - 1];
                        if (lastPart.includes(':')) time = lastPart;
                    }

                    const btn = document.createElement('button');
                    btn.className = 'movie-btn';
                    
                    btn.innerHTML = `
                        <div class="movie-info-row">
                            <strong>${session.title}</strong>
                            <span class="availability-badge">${occupiedCount} booked</span>
                        </div>
                        <div class="movie-info-row">
                            <small>${session.Room || 'Unknown Room'}</small>
                            <small>${time}</small>
                        </div>
                    `;
                    btn.onclick = () => selectSession(session, btn);
                    group.appendChild(btn);
                });

                list.appendChild(group);
            });
        }

        function selectSession(session, btn) {
            // UI Feedback
            document.querySelectorAll('.movie-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            document.getElementById('room-title').textContent = session.Room.toUpperCase();
            document.getElementById('selected-movie').textContent = session.title;
            document.getElementById('theater-map').style.display = 'flex';
            document.getElementById('stage').style.display = 'block';
            document.getElementById('legend').style.display = 'flex';

            renderRoom(session);
        }

        function renderRoom(session) {
            const container = document.getElementById('theater-map');
            container.innerHTML = '';
            
            let roomName = session.Room;
            // Clean up "Sala 04" to "Sala 4" to match ROOM_LAYOUTS keys if needed
            if (roomName.includes(" 0")) {
                 roomName = roomName.replace(" 0", " ");
            }

            const layout = ROOM_LAYOUTS[roomName] || ROOM_LAYOUTS["Sala 1"];

            // Calculate max slots across all rows for the grid
            let maxSlots = 0;
            layout.rows.forEach(r => {
                let slots = 0;
                slots += 1; // Left Label
                if (r.offset) slots += r.offset;
                if (r.wheelchairs && r.wheelchairs.includes('left')) slots += 1;
                slots += r.seats;
                if (r.gap) slots += r.gap.size;
                if (r.wheelchairs && r.wheelchairs.includes('right')) slots += 1;
                slots += 1; // Right Label
                if (slots > maxSlots) maxSlots = slots;
            });

            // Since movies_data.json only gives us a flat list of available/occupied seats with IDs like "s0", "s1", 
            // and we don't have explicit row/number in the JSON, we need to map them sequentially.
            // Let's create a Set of available seat IDs for quick lookup.
            const availableSeatIds = new Set(session.available_seats.map(s => s.id));
            let seatIndexCounter = 0; // To track the linear index of seats

            layout.rows.forEach(rowData => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'theater-row';
                
                // For perfectly straight columns, force grid size
                rowDiv.style.gridTemplateColumns = `repeat(${maxSlots}, 22px)`;
                
                if (layout.direction === 'rtl') {
                    rowDiv.style.direction = 'rtl'; // Built-in CSS mirror magic
                } else {
                    rowDiv.style.direction = 'ltr';
                }

                // Add Left Row Label
                const labelLeft = document.createElement('div');
                labelLeft.className = 'row-label section-label';
                labelLeft.style.width = '22px'; // Match seat width
                labelLeft.textContent = rowData.row;
                rowDiv.appendChild(labelLeft);

                // --- 1. Apply Indent Offset (Empty Spaces) ---
                if (rowData.offset) {
                    for (let i = 0; i < rowData.offset; i++) {
                        const empty = document.createElement('div');
                        empty.className = 'seat empty';
                        empty.style.backgroundColor = 'transparent';
                        empty.style.cursor = 'default';
                        empty.style.boxShadow = 'none';
                        rowDiv.appendChild(empty);
                    }
                }

                // --- 2. Left Wheelchair ---
                // if (rowData.wheelchairs && rowData.wheelchairs.includes('left')) {
                //     const wc = document.createElement('div');
                //     wc.className = 'seat accessible available';
                //     wc.title = 'Silla de ruedas';
                //     rowDiv.appendChild(wc);
                // }

                // --- 3. Build Actual Seats ---
                for (let i = 1; i <= rowData.seats; i++) {
                // for (let i = rowData.seats; i >= 0; i--) {
                    
                    // Check if we need to insert an aisle gap here
                    if (rowData.gap && rowData.gap.afterSeat === i - 1) {
                        for(let g = 0; g < rowData.gap.size; g++) {
                             const gapSpan = document.createElement('div');
                             gapSpan.className = 'seat empty gap';
                             gapSpan.style.backgroundColor = 'transparent';
                             gapSpan.style.cursor = 'default';
                             gapSpan.style.boxShadow = 'none';
                             rowDiv.appendChild(gapSpan);
                        }
                    }

                    const seat = document.createElement('div');
                    seat.className = 'seat';
                    
                    // Check if seat is marked unavailable by layout (e.g. broken, removed)
                    if (rowData.unavailable && rowData.unavailable.includes(i)) {
                        seat.classList.add('occupied'); // Or create an 'unavailable' class
                        seat.style.opacity = '0.3';
                    } else {
                        // Check if seat is available according to the live session data
                        const seatId = `s${seatIndexCounter}`;
                        const isAvailable = availableSeatIds.has(seatId);

                        const tooltip = document.createElement('div');
                        tooltip.classList.add('tooltip');

                        if (isAvailable) {
                            seat.classList.add('available');
                            tooltip.innerHTML = `<strong>Fila ${rowData.row} - Asiento ${i}</strong>`;
                        } else {
                            seat.classList.add('occupied');
                            tooltip.innerHTML = `<strong>Fila ${rowData.row} - Asiento ${i} (Ocupado)</strong>`;
                        }
                        seat.appendChild(tooltip);
                        seatIndexCounter++; // Only increment for valid bookable seats
                    }
                    rowDiv.appendChild(seat);
                }

                // // --- 4. Right Wheelchair ---
                // if (rowData.wheelchairs && rowData.wheelchairs.includes('right')) {
                //     const wc = document.createElement('div');
                //     wc.className = 'seat accessible available';
                //     wc.title = 'Silla de ruedas';
                //     rowDiv.appendChild(wc);
                // }

                // Fill remaining right slots with empty blocks to maintain grid structure
                let currentSlots = rowDiv.children.length;
                for (let i = currentSlots; i < maxSlots - 1; i++) {
                    const empty = document.createElement('div');
                    empty.className = 'seat empty';
                    empty.style.backgroundColor = 'transparent';
                    empty.style.cursor = 'default';
                    empty.style.boxShadow = 'none';
                    rowDiv.appendChild(empty);
                }

                // Add Right Row Label at the very end
                const labelRight = document.createElement('div');
                labelRight.className = 'row-label section-label';
                labelRight.style.width = '22px'; // Match seat width
                labelRight.textContent = rowData.row;
                rowDiv.appendChild(labelRight);

                container.appendChild(rowDiv);
            });
        }

        init();
    </script>
